<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | AUREVIA Premium Camera Rentals</title>
  <style>
    :root {
      --obsidian: #080808;
      --charcoal: #151515;
      --gold-champagne: #D8B36A;
      --ivory: #F5F1E8;
      --font-serif: 'Georgia', serif;
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--obsidian);
      color: var(--ivory);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Film grain effect overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 480px;
      text-align: center;
      border: 1px solid rgba(216, 179, 106, 0.2);
      background-color: var(--charcoal);
      padding: 48px 32px;
      border-radius: 4px;
      position: relative;
      z-index: 2;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 28px;
      letter-spacing: 0.2em;
      color: var(--gold-champagne);
      text-transform: uppercase;
      margin-bottom: 32px;
      font-weight: 700;
    }

    .icon-wrapper {
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
    }

    .wifi-off-icon {
      width: 48px;
      height: 48px;
      stroke: var(--gold-champagne);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: pulse 2s infinite ease-in-out;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      color: var(--ivory);
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: #9A9995;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: transparent;
      border: 1px solid var(--gold-champagne);
      color: var(--gold-champagne);
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      padding: 12px 28px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      border-radius: 2px;
    }

    .btn:hover {
      background-color: var(--gold-champagne);
      color: var(--obsidian);
      box-shadow: 0 0 15px rgba(216, 179, 106, 0.4);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">AUREVIA</div>
    <div class="icon-wrapper">
      <svg class="wifi-off-icon" viewBox="0 0 24 24">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.58 8.58A15 15 0 0 1 12 7.5a15 15 0 0 1 7 1.8M1.37 5.76a21.43 21.43 0 0 1 1.77-1.1M10.28 4.69a21.94 21.94 0 0 1 11.95 2.17M12 20h.01" />
      </svg>
    </div>
    <h1>Connection Paused</h1>
    <p>The cinematic experience is temporarily offline. Please check your network connection to resume framing the extraordinary.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
